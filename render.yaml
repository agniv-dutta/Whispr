services:
  - type: web
    name: whispr-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn run:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://whispr-app.vercel.app,https://whispr.vercel.app
      - key: SENTRY_DSN
        sync: false
